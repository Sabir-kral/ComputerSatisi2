name: ComputerSatisi2 CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests
        # Əgər Java kodların birbaşa ana qovluqdadırsa, 'working-directory' hissəsinə ehtiyac yoxdur.

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t sabirkral/computersatisi-dev:latest .

      - name: Push Docker Image
        run: docker push sabirkral/computersatisi-dev:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }} # Bura mütləq o məşhur tireli sətirlərlə (BEGIN/END) olan key olmalıdır
          script: |
            cd ~/ComputerSatisi2
            docker-compose down
            docker-compose pull
            docker-compose up -d
            docker image prune -f
