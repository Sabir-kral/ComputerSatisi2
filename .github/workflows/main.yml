name: ComputerSatisi2 CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests
        working-directory: ./demo

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t sabirkral123/computersatisi-dev:latest .
        working-directory: ./demo
        # working-directory hissəsini sildik

      - name: Push Docker Image
        run: docker push sabirkral123/computersatisi-dev:latest
        working-directory: ./demo

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }} # Tireli sətirlərlə olan o meşhur KEY
          script: |
            cd ~/ComputerSatisi2
            docker-compose docker-compose.yml down
            docker-compose docker-compose.yml pull
            docker-compose docker-compose.yml up -d
