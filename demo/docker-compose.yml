version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: computersatisi-db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    networks:
      - computersatisi-net

  computersatisi-app:
    build: .
    container_name: computersatisi-backend
    restart: on-failure # Həmişə yox, xəta alanda yenidən başlasın
    depends_on:
      - db
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      EMAIL: ${EMAIL}
      APP_PASSWORD: ${APP_PASSWORD}
    ports:
      - "8080:8080"
    networks:
      - computersatisi-net

networks:
  computersatisi-net:
    driver: bridge