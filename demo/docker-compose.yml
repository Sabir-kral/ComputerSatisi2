version: '3.8'

services:
  # MySQL Baza Servisi
  db:
    image: mysql:8.0
    container_name: computersatisi-db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    networks:
      - computersatisi-net
    volumes:
      - mysql_data:/var/lib/mysql
    # RAM çatışmazlığı ehtimalına qarşı yaddaş limiti və optimallaşdırma
    command: --default-authentication-plugin=mysql_native_password --innodb-buffer-pool-size=256M
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Spring Boot Backend Servisi
  computersatisi-app:
    build: .
    container_name: computersatisi-backend
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # JDBC URL-də host olaraq 'db' istifadə edilir (şəbəkə adı)
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${DB_NAME}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET}
      EMAIL: ${EMAIL}
      APP_PASSWORD: ${APP_PASSWORD}
      SERVER_SSL_ENABLED: "false"
    ports:
      - "8080:8080"
    networks:
      - computersatisi-net
    volumes:
      - ./uploads:/app/uploads

  # Frontend (React/Next.js) Servisi
  computersatisi-frontend:
    build:
      context: ../frontEnd
    container_name: computersatisi-frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      - computersatisi-app
    networks:
      - computersatisi-net
    environment:
      - REACT_APP_API_URL=http://computersatisi-backend:8080
      - NEXT_PUBLIC_API_URL=http://computersatisi-backend:8080

networks:
  computersatisi-net:
    driver: bridge

volumes:
  mysql_data:c