<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Sifariş | TechStore</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .checkout-card { background: #161b22; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid #30363d; }
        .product-item { background: #0d1117; padding: 10px; margin-bottom: 8px; border-radius: 6px; border-left: 4px solid #58a6ff; display: flex; justify-content: space-between; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        .btn-confirm { width: 100%; padding: 14px; background: #49fb35; color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="checkout-card">
    <h2 style="text-align:center; color:#58a6ff;">🛒 Sifarişi Tamamla</h2>
    <div id="product-list"></div>
    <p style="text-align:right;">Cəmi: <span id="final-price" style="color:#49fb35; font-weight:bold;">0</span> AZN</p>

    <input type="tel" id="phone" placeholder="Telefon nömrəniz">
    <button class="btn-confirm" id="confirm-btn" onclick="confirmOrder()">✅ Təsdiqlə və Al</button>
    <div id="result-message" style="text-align:center; margin-top:15px;"></div>
</div>

<script>
    const token = localStorage.getItem('accessToken');
    const cartItems = JSON.parse(localStorage.getItem("userCart")) || [];

    if (!token || cartItems.length === 0) location.href = 'index.html';

    const listContainer = document.getElementById('product-list');
    let totalAmount = 0;

    listContainer.innerHTML = cartItems.map(pc => {
        totalAmount += parseFloat(pc.price);
        return `<div class="product-item"><span>${pc.name}</span><b>${pc.price} AZN</b></div>`;
    }).join('');
    document.getElementById('final-price').innerText = totalAmount;

    async function confirmOrder() {
        const phone = document.getElementById('phone').value.trim();
        const result = document.getElementById('result-message');
        const btn = document.getElementById('confirm-btn');

        if (!phone) { alert("Nömrəni yazın!"); return; }

        btn.disabled = true;
        btn.innerText = 'İşlənilir...';

        try {
            // 1. Ödəniş sorğusu
            const res = await fetch('http://95.111.230.66:8080/api/payments/checkout', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, computerIds: cartItems.map(p => p.id), amount: totalAmount })
            });

            if (res.ok) {
                // 2. BAZADAN SİLMƏ (Status yoxdursa, hər birini tək-tək silirik)
                for (let pc of cartItems) {
                    await fetch(`http://95.111.230.66:8080/api/computers/${pc.id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                }

                // 3. Uğurlu mesaj və səbəti təmizləmə
                localStorage.setItem("userCart", JSON.stringify([]));
                result.innerHTML = "<span style='color:#49fb35;'>✅ Uğurlu oldu! Gmail-inizə baxın.</span>";
                setTimeout(() => { location.href = 'index.html'; }, 3000);
            }
        } catch (err) {
            result.innerText = "Xəta baş verdi!";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
