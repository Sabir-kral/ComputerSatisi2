<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SifariŇü | TechStore</title>
    <style>
        body { 
            background-color: #0d1117; 
            color: white; 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .checkout-card { 
            background: #161b22; 
            padding: 40px; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 400px; 
            border: 1px solid #30363d; 
        }
        .product-item { 
            background: #0d1117; 
            padding: 10px; 
            margin-bottom: 8px; 
            border-radius: 6px; 
            border-left: 4px solid #58a6ff; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 15px 0; 
            border-radius: 6px; 
            border: 1px solid #30363d; 
            background: #0d1117; 
            color: white; 
            box-sizing: border-box; 
        }
        input:focus {
            outline: 1px solid #58a6ff;
        }
        .btn-confirm { 
            width: 100%; 
            padding: 14px; 
            background: #49fb35; 
            color: #000; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
        }
        .btn-confirm:disabled {
            background: #6a737d;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="checkout-card">
    <h2 style="text-align:center; color:#58a6ff;">ūüõí SifariŇüi Tamamla</h2>
    <div id="product-list"></div>
    <p style="text-align:right;">C…ômi: <span id="final-price" style="color:#49fb35; font-weight:bold;">0</span> AZN</p>

    <input type="tel" id="phone" placeholder="Telefon n√∂mr…ôniz">
    <button class="btn-confirm" id="confirm-btn" onclick="confirmOrder()">‚úÖ T…ôsdiql…ô v…ô Al</button>
    <div id="result-message" style="text-align:center; margin-top:15px;"></div>
</div>

<script>
    // Access token-i obyekt daxilind…ôn t…ôhl√ľk…ôsiz Ňü…ôkild…ô dartńĪrńĪq
    let token = localStorage.getItem('accessToken');
    if (!token) {
        const activeUserStr = localStorage.getItem('activeUser');
        if (activeUserStr) {
            try {
                const activeUser = JSON.parse(activeUserStr);
                token = activeUser.accessToken;
            } catch(e) {
                console.error("User token oxunark…ôn x…ôta:", e);
            }
        }
    }
    
    // H…ôm s…ôb…ôti, h…ôm d…ô t…ôk g…ôl…ôn "ńįndi Al" m…ôhsulunu localStoraged…ôn oxuyuruq
    const cartItems = JSON.parse(localStorage.getItem("userCart")) || [];
    const singleProduct = JSON.parse(localStorage.getItem("selectedPc"));

    // SifariŇü olunacaq …ôsas siyahńĪ (∆Źg…ôr singleProduct varsa t…ôk odur, yoxdursa s…ôb…ôtdir)
    let checkoutItems = [];
    if (singleProduct) {
        checkoutItems = [singleProduct]; // T…ôk m…ôhsulu massiv…ô salńĪrńĪq ki, map funksiyasńĪ iŇül…ôsin
    } else {
        checkoutItems = cartItems;
    }

    // ∆Źg…ôr token yoxdursa V∆Ź YA h…ôm s…ôb…ôt, h…ôm d…ô t…ôk m…ôhsul boŇüdursa, index-…ô qaytar
    if (!token || checkoutItems.length === 0) {
        location.href = 'index.html';
    }

    const listContainer = document.getElementById('product-list');
    let totalAmount = 0;

    // SiyahńĪnńĪ ekrana √ßńĪxarńĪrńĪq
    listContainer.innerHTML = checkoutItems.map(pc => {
        const price = parseFloat(pc.price) || 0;
        totalAmount += price;
        return `<div class="product-item"><span>${pc.name || 'Komp√ľter'}</span><b>${price} AZN</b></div>`;
    }).join('');

    document.getElementById('final-price').innerText = totalAmount.toFixed(2);

    async function confirmOrder() {
        const phone = document.getElementById('phone').value.trim();
        const result = document.getElementById('result-message');
        const btn = document.getElementById('confirm-btn');

        if (!phone) { 
            alert("N√∂mr…ôni yazńĪn!"); 
            return; 
        }

        btn.disabled = true;
        btn.innerText = 'ńįŇül…ônilir...';
        result.innerText = "";

        try {
            // 1. Backend-…ô checkout sorńüusu g√∂nd…ôririk
            const res = await fetch('http://95.111.230.66:8080/api/payments/checkout', {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${token}`, 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({ 
                    phone: phone, 
                    computerIds: checkoutItems.map(p => p.id), 
                    amount: totalAmount 
                })
            });

            if (res.ok) {
                // 2. SifariŇü olunan komp√ľterl…ôri bazadan t…ôk-t…ôk silirik
                for (let pc of checkoutItems) {
                    try {
                        await fetch(`http://95.111.230.66:8080/api/computers/${pc.id}`, {
                            method: 'DELETE',
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                    } catch (deleteErr) {
                        console.error(`${pc.id} silin…ôrk…ôn x…ôta:`, deleteErr);
                    }
                }

                // 3. Uńüurlu …ôm…ôliyyatdan sonra yaddaŇüńĪ t…ômizl…ôyirik
                if (singleProduct) {
                    // ∆Źg…ôr "ńįndi Al" il…ô g…ôlibs…ô, m√ľv…ôqq…ôti m…ôhsulu silirik
                    localStorage.removeItem("selectedPc");
                } else {
                    // ∆Źg…ôr s…ôb…ôtd…ôn g…ôlibs…ô, s…ôb…ôti sńĪfńĪrlayńĪrńĪq
                    localStorage.setItem("userCart", JSON.stringify([]));
                }

                result.innerHTML = "<span style='color:#49fb35; font-weight:bold;'>‚úÖ Uńüurlu oldu! Gmail-iniz…ô baxńĪn.</span>";
                
                setTimeout(() => { 
                    location.href = 'index.html'; 
                }, 3000);

            } else {
                result.innerHTML = `<span style='color:#ff4a4a;'>Server x…ôtasńĪ baŇü verdi!</span>`;
                btn.disabled = false;
                btn.innerText = '‚úÖ T…ôsdiql…ô v…ô Al';
            }

        } catch (err) {
            result.innerHTML = "<span style='color:#ff4a4a;'>Ňě…ôb…ôk…ô x…ôtasńĪ baŇü verdi!</span>";
            btn.disabled = false;
            btn.innerText = '‚úÖ T…ôsdiql…ô v…ô Al';
        }
    }
</script>
</body>
</html>
