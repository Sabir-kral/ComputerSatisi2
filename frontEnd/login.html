<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Giriş | TechStore</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="auth-container">
        <form class="auth-form" id="login-form">
            <h2>Xoş Gəldiniz</h2>
            <p>Davam etmək üçün giriş edin</p>
            
            <div class="input-group">
                <input type="email" id="email" placeholder="Email ünvanı" required>
            </div>
            
            <div class="input-group">
                <input type="password" id="password" placeholder="Şifrə" required>
            </div>
            
            <button type="submit" class="btn-auth">Giriş Et</button>
            
            <div class="auth-footer">
                Hesabınız yoxdur? <a href="register.html">Qeydiyyatdan keçin</a>
            </div>
        </form>
    </div>
    <script src="login.js"></script>
</body>
</html>
