<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore</title>
    <style>
        :root {
            --blue: #58a6ff;
            --bg: #0d1117;
            --card: #161b22;
            --text: #c9d1d9;
            --green: #49fb35;
            --yellow: #f1c40f;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', sans-serif; overflow-x: hidden;
        }

        .main-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: #010409; border-bottom: 1px solid #30363d;
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 24px; font-weight: 800; color: white; cursor: pointer; }
        .logo span { color: var(--blue); }
        .nav-right { display: flex; align-items: center; gap: 20px; }

        .btn-login {
            background: var(--blue); color: white; text-decoration: none;
            padding: 8px 20px; border-radius: 6px; font-weight: 600; transition: 0.3s;
        }
        .btn-login:hover { opacity: 0.8; }

        .user-section {
            display: none; align-items: center; gap: 12px; cursor: pointer;
            padding: 5px 10px; border-radius: 8px; transition: 0.3s;
        }
        .user-section:hover { background: rgba(255,255,255,0.1); }
        .user-gmail { color: var(--text); font-size: 0.9rem; }
        .user-avatar {
            width: 35px; height: 35px; background: var(--blue);
            color: white; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; font-weight: bold;
            border: 2px solid #30363d;
        }

        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px; padding: 50px 5%;
        }
        .pc-card {
            background: var(--card); border: 1px solid #30363d;
            border-radius: 15px; padding: 25px; cursor: pointer; transition: 0.3s;
        }
        .pc-card:hover { border-color: var(--blue); transform: translateY(-5px); }

        /* OVERLAY */
        .detail-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(13, 17, 23, 0.97);
            display: none; justify-content: center; align-items: center;
            z-index: 10000; opacity: 0; transition: opacity 0.3s;
        }
        .detail-overlay.active { display: flex; opacity: 1; }

        .detail-content {
            display: flex; flex-direction: row; width: 90%; max-width: 1100px;
            gap: 40px; z-index: 50; align-items: center; justify-content: center;
            cursor: grab;
        }

        .left-side { flex: 1; text-align: center; }
        
        /* Şəkil ölçüsü düzəlişi */
        .detail-img {
            width: 100%; 
            max-width: 450px; 
            max-height: 400px; 
            object-fit: contain; 
            border-radius: 20px;
            border: 4px solid var(--blue); 
            box-shadow: 0 0 40px rgba(88,166,255,0.2);
            background: #1c2128;
        }
        
        .detail-name { font-size: 2.5rem; color: white; margin-top: 20px; text-transform: uppercase; }

        .right-side {
            flex: 1.2; background: rgba(255,255,255,0.03);
            padding: 30px; border-radius: 25px; border-left: 8px solid var(--blue);
        }
        .detail-desc { font-size: 1.1rem; line-height: 1.6; color: var(--text); max-height: 200px; overflow-y: auto; }
        .detail-price { font-size: 2.2rem; color: var(--blue); font-weight: bold; margin-top: 15px; }

        .back-btn {
            border: none; color: white; padding: 12px 25px; 
            border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .back-btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo" onclick="location.reload()">TECH<span>STORE</span></div>
        <div class="nav-right">
            <a href="login.html" id="loginBtn" class="btn-login">Giriş</a>
            <div id="userSection" class="user-section" onclick="window.location.href='profile.html'">
                <span id="userGmail" class="user-gmail"></span>
                <div id="userAvatar" class="user-avatar"></div>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="computer-container" class="grid-container"></div>
        <div id="backend-status"></div>
    </main>

    <div id="detailOverlay" class="detail-overlay">
        <div id="detailContent" class="detail-content"></div>
    </div>

    <script>
        const API_BASE = "http://95.111.230.66:8080/api";

        function checkAuth() {
            const token = localStorage.getItem("token") || localStorage.getItem("accessToken");
            const email = localStorage.getItem("email") || localStorage.getItem("userEmail");
            if (token && email) {
                document.getElementById("loginBtn").style.display = "none";
                document.getElementById("userSection").style.display = "flex";
                document.getElementById("userGmail").innerText = email;
                document.getElementById("userAvatar").innerText = email.charAt(0).toUpperCase();
            }
        }

        async function loadComputers() {
            try {
                const container = document.getElementById("computer-container");
                const response = await fetch(`${API_BASE}/customers/v2`);
                if (!response.ok) throw new Error("Server xətası");
                const computers = await response.json();

                container.innerHTML = computers.map(pc => {
                    const mainImage = pc.imageLinks?.[0] || 'https://via.placeholder.com/280x200?text=No+Image';
                    return `
                        <div class="pc-card" onclick="openDetails(${pc.id})">
                            <img src="${mainImage}" alt="${pc.name}" style="width:100%; height:180px; object-fit:cover; border-radius:10px; margin-bottom:15px;">
                            <h3 style="margin:10px 0;">${pc.name}</h3>
                            <p style="color:var(--blue); font-weight:bold; font-size:1.2rem;">${pc.price} AZN</p>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                document.getElementById("backend-status").innerHTML = `<p style="color: #f87171; text-align:center;">Bağlantı xətası.</p>`;
            }
        }

        async function openDetails(id) {
            const overlay = document.getElementById("detailOverlay");
            const content = document.getElementById("detailContent");
            const token = localStorage.getItem("token") || localStorage.getItem("accessToken");

            overlay.classList.add("active");
            content.innerHTML = "<h1 style='color:white'>Yüklənir...</h1>";

            try {
                const res = await fetch(`${API_BASE}/computers/${id}`, {
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });
                if (!res.ok) throw new Error();
                const pc = await res.json();
                const img = pc.imageLinks?.[0] || 'https://via.placeholder.com/450x300?text=No+Image';

                content.innerHTML = `
                    <div class="left-side">
                        <img src="${img}" class="detail-img">
                        <h1 class="detail-name">${pc.name}</h1>
                    </div>
                    <div class="right-side">
                        <div class="detail-desc">${pc.description || "Açıqlama yoxdur."}</div>
                        <div class="detail-price">${pc.price} AZN</div>
                        <div style="display:flex; flex-wrap:wrap; gap:15px; margin-top:25px;">
                            <button class="back-btn" style="background:#30363d;" onclick="closeDetails()">← GERİ</button>
                            <button class="back-btn" style="background:var(--green); color:#000;" onclick="buyComputer(${pc.id}, '${pc.name}', ${pc.price})">İNDİ AL</button>
                            <button class="back-btn" style="background:var(--yellow); color:#000;" onclick="addToCart({id: ${pc.id}, name: '${pc.name}', price: ${pc.price}, img: '${img}'})">🛒 SƏBƏTƏ AT</button>
                        </div>
                    </div>
                `;
                setupDrag(content);
            } catch (e) {
                content.innerHTML = "<h1 style='color:white'>Xəta baş verdi.</h1>";
                setTimeout(closeDetails, 2000);
            }
        }

        function addToCart(product) {
            let cart = JSON.parse(localStorage.getItem("userCart")) || [];
            if (cart.some(item => item.id === product.id)) {
                alert("Bu məhsul artıq səbətdədir!");
                return;
            }
            cart.push(product);
            localStorage.setItem("userCart", JSON.stringify(cart));
            alert("Məhsul səbətə əlavə edildi!");
        }

        function buyComputer(id, name, price) {
            const token = localStorage.getItem("token") || localStorage.getItem("accessToken");
            if (!token) {
                alert("Giriş etməlisiniz!");
                window.location.href = "login.html";
                return;
            }
            localStorage.setItem("selectedPC", JSON.stringify({ id, name, price }));
            window.location.href = "checkout.html";
        }

        function closeDetails() {
            const overlay = document.getElementById("detailOverlay");
            overlay.style.opacity = "0";
            setTimeout(() => {
                overlay.classList.remove("active");
                overlay.style.opacity = "1";
                document.getElementById("detailContent").style.transform = "translate(0,0)";
            }, 300);
        }

        function setupDrag(content) {
            let isDragging = false, startX, startY, currentX = 0, currentY = 0;
            content.onmousedown = (e) => {
                if (e.target.tagName === 'BUTTON') return;
                isDragging = true;
                startX = e.clientX - currentX; startY = e.clientY - currentY;
                content.style.cursor = "grabbing";
            };
            document.onmousemove = (e) => {
                if (!isDragging) return;
                currentX = e.clientX - startX; currentY = e.clientY - startY;
                content.style.transform = `translate(${currentX}px, ${currentY}px)`;
            };
            document.onmouseup = () => {
                isDragging = false;
                content.style.cursor = "grab";
                content.style.transition = "transform 0.5s ease";
                content.style.transform = "translate(0,0)";
                currentX = 0; currentY = 0;
                setTimeout(() => content.style.transition = "", 500);
            };
        }

        window.onload = () => { checkAuth(); loadComputers(); };
    </script>
</body>
</html>
