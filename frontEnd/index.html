<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore</title>
    <style>
        :root {
            --blue: #58a6ff;
            --bg: #0d1117;
            --card: #161b22;
            --text: #c9d1d9;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', sans-serif; overflow-x: hidden;
        }

        .main-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: #010409; border-bottom: 1px solid #30363d;
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 24px; font-weight: 800; color: white; cursor: pointer; }
        .logo span { color: var(--blue); }
        .nav-right { display: flex; align-items: center; gap: 20px; }

        .btn-login {
            background: var(--blue); color: white; text-decoration: none;
            padding: 8px 20px; border-radius: 6px; font-weight: 600; transition: 0.3s;
        }
        .btn-login:hover { opacity: 0.8; }

        .user-section {
            display: none; align-items: center; gap: 12px; cursor: pointer;
            padding: 5px 10px; border-radius: 8px; transition: 0.3s;
        }
        .user-section:hover { background: rgba(255,255,255,0.1); }
        .user-gmail { color: var(--text); font-size: 0.9rem; }
        .user-avatar {
            width: 35px; height: 35px; background: var(--blue);
            color: white; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; font-weight: bold;
            border: 2px solid #30363d;
        }

        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px; padding: 50px 5%;
        }
        .pc-card {
            background: var(--card); border: 1px solid #30363d;
            border-radius: 15px; padding: 25px; cursor: pointer; transition: 0.3s;
        }
        .pc-card:hover { border-color: var(--blue); transform: translateY(-5px); }

        /* OVERLAY */
        .detail-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(13, 17, 23, 0.97);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            overflow: hidden;
        }
        .detail-overlay.active {
            display: flex;
            animation: overlayIn 0.3s ease forwards;
        }

        @keyframes overlayIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes cardIn {
            0%   { transform: scale(0.5); opacity: 0; }
            60%  { transform: scale(1.05); opacity: 1; }
            80%  { transform: scale(0.97); }
            100% { transform: scale(1); }
        }

        @keyframes wobble {
            0%   { transform: scale(1) rotate(0deg); }
            20%  { transform: scale(1.05) rotate(-3deg); }
            40%  { transform: scale(0.95) rotate(3deg); }
            60%  { transform: scale(1.02) rotate(-1.5deg); }
            80%  { transform: scale(0.98) rotate(1deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        .slider-wrapper {
    position: relative;
    display: inline-block;
    width: 100%;
    max-width: 450px;
}

.slider-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(88, 166, 255, 0.8);
    border: none;
    color: white;
    font-size: 1.5rem;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 10;
    transition: 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
}
.slider-btn:hover { background: var(--blue); transform: translateY(-50%) scale(1.1); }
.left-btn { left: 5px; }
.right-btn { right: 5px; }

#sliderImg {
    transition: opacity 0.2s ease, transform 0.2s ease;
}

.slider-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 12px;
}
.dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #30363d;
    cursor: pointer;
    transition: 0.3s;
}
.dot.active { background: var(--blue); transform: scale(1.3); }

        .detail-content {
            display: flex;
            flex-direction: row;
            width: 90%;
            max-width: 1200px;
            gap: 60px;
            z-index: 50;
            align-items: center;
            justify-content: center;
            cursor: grab;
        }

        .left-side { flex: 1; text-align: center; }
        .detail-img {
            width: 100%; max-width: 450px; border-radius: 20px;
            border: 4px solid var(--blue); box-shadow: 0 0 40px rgba(88,166,255,0.2);
        }
        .detail-name { font-size: 3rem; color: white; margin-top: 20px; text-transform: uppercase; }

        .right-side {
            flex: 1.5; background: rgba(255,255,255,0.03);
            padding: 40px; border-radius: 25px; border-left: 8px solid var(--blue);
        }
        .detail-desc { font-size: 1.2rem; line-height: 1.7; color: var(--text); }
        .detail-price { font-size: 2.5rem; color: var(--blue); font-weight: bold; margin-top: 15px; }

        .back-btn {
            background: var(--blue); border: none; color: white;
            padding: 12px 30px; border-radius: 50px; cursor: pointer;
            font-weight: bold; margin-top: 20px;
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo" onclick="location.reload()">TECH<span>STORE</span></div>
        <div class="nav-right">
            <a href="login.html" id="loginBtn" class="btn-login">Giriş</a>
            <div id="userSection" class="user-section" onclick="window.location.href='profile.html'">
                <span id="userGmail" class="user-gmail"></span>
                <div id="userAvatar" class="user-avatar"></div>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="computer-container" class="grid-container"></div>
    </main>

    <div id="detailOverlay" class="detail-overlay">
        <div id="detailContent" class="detail-content"></div>
    </div>

    <script>
        const API_BASE = "https://localhost:8080/api";

        function checkAuth() {
            const token = localStorage.getItem("token") || localStorage.getItem("accessToken");
            const email = localStorage.getItem("email") || localStorage.getItem("userEmail");
            const loginBtn = document.getElementById("loginBtn");
            const userSection = document.getElementById("userSection");
            const userGmail = document.getElementById("userGmail");
            const userAvatar = document.getElementById("userAvatar");

            if (token && email) {
                loginBtn.style.display = "none";
                userSection.style.display = "flex";
                userGmail.innerText = email;
                userAvatar.innerText = email.charAt(0).toUpperCase();
            } else {
                loginBtn.style.display = "block";
                userSection.style.display = "none";
            }
        }

        async function loadComputers() {
            try {
                const res = await fetch(`${API_BASE}/customers/v2`);
                const data = await res.json();
                const container = document.getElementById("computer-container");

                if (!data || data.length === 0) {
                    container.innerHTML = "<p style='text-align:center; color:#8b949e; font-size:1.5rem; margin-top:50px;'>Hal-hazırda heç bir kompüter yoxdur.</p>";
                    return;
                }

                // Sənin kompüterləri göstərdiyin hissə belə olmalıdır:
container.innerHTML = computers.map(pc => `
    <div class="pc-card" onclick="toggleSelectPc(${pc.id}, this)" 
         style="cursor:pointer; padding:10px; margin:5px; background:#161b22; border-radius:8px; transition: 0.3s;">
        <img src="${pc.images[0]?.url}" width="100%">
        <h3>${pc.name}</h3>
        <p>${pc.price} AZN</p>
    </div>
`).join('');
            } catch (err) {
                console.log("Backend offline:", err);
            }
        }

        async function openDetails(id) {
    const overlay = document.getElementById("detailOverlay");
    const content = document.getElementById("detailContent");
    const token = localStorage.getItem("token") || localStorage.getItem("accessToken");

    overlay.classList.remove("active");
    void overlay.offsetWidth;
    overlay.classList.add("active");

    content.innerHTML = "<h1 style='color:white; text-align:center;'>Yüklənir...</h1>";
    content.style.animation = "none";

    try {
        const res = await fetch(`${API_BASE}/computers/${id}`, {
            headers: token ? { 'Authorization': `Bearer ${token}` } : {}
        });
        const pc = await res.json();
        const images = pc.imageLinks && pc.imageLinks.length > 0
            ? pc.imageLinks
            : ['https://via.placeholder.com/450x300?text=No+Image'];

        content.innerHTML = `
            <div class="left-side">
                <div class="slider-wrapper">
                    ${images.length > 1 ? `<button class="slider-btn left-btn" onclick="slideImg(-1)">&#8592;</button>` : ''}
                    <img id="sliderImg" src="${images[0]}" class="detail-img" onerror="this.src='https://via.placeholder.com/450x300?text=No+Image'">
                    ${images.length > 1 ? `<button class="slider-btn right-btn" onclick="slideImg(1)">&#8594;</button>` : ''}
                    ${images.length > 1 ? `<div class="slider-dots" id="sliderDots"></div>` : ''}
                </div>
                <h1 class="detail-name">${pc.name}</h1>
            </div>
            <div class="right-side">
                <div class="detail-desc">${pc.description}</div>
                <div class="detail-price">${pc.price} AZN</div>
                <div style="display:flex; gap:15px; margin-top:25px;">
                    <button class="back-btn" onclick="closeDetails()">← GERİ</button>
                    <button class="back-btn" style="background:#49fb35; color:#000;" onclick="buyComputer(${pc.id})">İNDİ AL</button>
                </div>
            </div>
        `;

        if (images.length > 1) {
            createSlider(images);
        }

        void content.offsetWidth;
        content.style.animation = "cardIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards";
        setupDrag(content);

    } catch (e) {
        console.error(e);
        closeDetails();
    }
}

function createSlider(images) {
    let current = 0;
    const img = document.getElementById("sliderImg");
    const dotsContainer = document.getElementById("sliderDots");

    // Create dots
    dotsContainer.innerHTML = images.map((_, i) =>
        `<span class="dot ${i === 0 ? 'active' : ''}" onclick="goToSlide(${i})"></span>`
    ).join('');

    // Expose functions globally so onclick works
    window._sliderImages = images;
    window._sliderCurrent = 0;

    window.slideImg = function(dir) {
        window._sliderCurrent = (window._sliderCurrent + dir + images.length) % images.length;
        updateSlider();
    };

    window.goToSlide = function(index) {
        window._sliderCurrent = index;
        updateSlider();
    };

    function updateSlider() {
        const img = document.getElementById("sliderImg");
        const dots = document.querySelectorAll(".dot");

        img.style.opacity = "0";
        img.style.transform = "scale(0.95)";

        setTimeout(() => {
            img.src = window._sliderImages[window._sliderCurrent];
            img.style.opacity = "1";
            img.style.transform = "scale(1)";
        }, 200);

        dots.forEach((d, i) => {
            d.classList.toggle("active", i === window._sliderCurrent);
        });
    }

    // Auto slide every 3 seconds
    if (window._autoSlide) clearInterval(window._autoSlide);
    window._autoSlide = setInterval(() => {
        window.slideImg(1);
    }, 3000);
}
function closeDetails() {
    const overlay = document.getElementById("detailOverlay");
    overlay.classList.remove("active");
    if (window._autoSlide) clearInterval(window._autoSlide);
}

        function setupDrag(content) {
            let isDragging = false;
            let startX, startY, currentX = 0, currentY = 0;

            content.onmousedown = (e) => {
                if (e.target.tagName === 'BUTTON') return;
                isDragging = true;
                startX = e.clientX - currentX;
                startY = e.clientY - currentY;
                content.style.animation = "none";
                content.style.cursor = "grabbing";
            };

            document.onmousemove = (e) => {
                if (!isDragging) return;
                currentX = e.clientX - startX;
                currentY = e.clientY - startY;

                const maxX = (window.innerWidth - content.offsetWidth) / 2;
                const maxY = (window.innerHeight - content.offsetHeight) / 2;

                let hitEdge = false;
                if (Math.abs(currentX) >= maxX * 0.85) {
                    currentX = Math.sign(currentX) * maxX * 0.85;
                    hitEdge = true;
                }
                if (Math.abs(currentY) >= maxY * 0.85) {
                    currentY = Math.sign(currentY) * maxY * 0.85;
                    hitEdge = true;
                }

                if (hitEdge) {
                    content.style.animation = "none";
                    void content.offsetWidth;
                    content.style.animation = "wobble 0.4s ease forwards";
                } else {
                    content.style.transform = `translate(${currentX}px, ${currentY}px)`;
                }
            };

            document.onmouseup = () => {
                if (!isDragging) return;
                isDragging = false;
                content.style.cursor = "grab";
                content.style.animation = "none";
                content.style.transition = "transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)";
                content.style.transform = "translate(0, 0)";
                currentX = 0;
                currentY = 0;
                setTimeout(() => { content.style.transition = ""; }, 500);
            };
        }

        async function buyComputer(computerId) {
            const token = localStorage.getItem("token") || localStorage.getItem("accessToken");

            if (!token) {
                alert("Kompüter almaq üçün giriş etməlisiniz!");
                window.location.href = "login.html";
                return;
            }

            try {
                const res = await fetch(`https://localhost:8080/api/customers/buy/${computerId}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (res.ok) {
                    alert("Təbriklər! Alış uğurla tamamlandı.");
                    closeDetails();
                } else {
                    const errorData = await res.json();
                    alert("Xəta: " + (errorData.message || "Alış baş tutmadı."));
                }
            } catch (err) {
                alert("Serverlə bağlantı kəsildi!");
            }
        }

        window.onload = () => {
            checkAuth();
            loadComputers();
        };
    </script>
</body>
</html>
