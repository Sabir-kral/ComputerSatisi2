<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>KompΟΦter Τèlav…ô Et</title>
    <link rel="stylesheet" href="add-computer.css">
    <style>
        .image-upload-area {
            border: 2px dashed #30363d;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 16px;
            color: #8b949e;
        }
        .image-upload-area:hover { border-color: #58a6ff; color: #58a6ff; }
        .image-preview-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }
        .preview-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #30363d;
        }
        .upload-status {
            color: #58a6ff;
            font-size: 0.85rem;
            margin-bottom: 10px;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Yeni KompΟΦter ElanΡ±</h2>
        <input type="text" id="pc-name" placeholder="KompΟΦterin AdΡ± (M…ôs: Dell XPS)">
        <input type="number" id="pc-price" placeholder="Qiym…ôt (AZN)">
        <textarea id="pc-desc" placeholder="T…ôsvir"></textarea>

        <!-- IMAGE UPLOAD -->
        <div class="image-upload-area" onclick="document.getElementById('image-input').click()">
            πü™Ζ ≈û…ôkil …ôlav…ô etm…ôk ΟΦΟßΟΦn klikl…ôyin
        </div>
        <input type="file" id="image-input" accept="image/*" multiple style="display:none" onchange="handleImageSelect(event)">
        <div class="upload-status" id="upload-status"></div>
        <div class="image-preview-container" id="image-previews"></div>

        <button class="btn-blue" onclick="savePC()">Payla≈ü</button>
        <button class="btn-danger" onclick="history.back()">Geri</button>
    </div>

    <script>
        const uploadedUrls = [];

        async function handleImageSelect(event) {
            const files = event.target.files;
            const token = localStorage.getItem('accessToken');
            const status = document.getElementById('upload-status');
            const previews = document.getElementById('image-previews');

            for (let file of files) {
                status.innerText = `YΟΦkl…ônir: ${file.name}...`;

const formData = new FormData();
formData.append("file", file);
                try {
                    const res = await fetch('http://95.111.230.66:8080/api/upload/image', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` },
                        body: formData,
                    });

                    const data = await res.json();

                    if (res.ok) {
                        uploadedUrls.push(data.url);

                        const img = document.createElement('img');
                        img.src = data.url;
                        img.className = 'preview-img';
                        previews.appendChild(img);

                        status.innerText = `β€™ ${file.name} yΟΦkl…ôndi`;
                    } else {
                        status.innerText = `β€½ ${file.name} yΟΦkl…ônm…ôdi`;
                    }
                } catch (err) {
                    status.innerText = 'BaΡülantΡ± x…ôtasΡ±!';
                }
            }
        }

        async function savePC() {
            const name = document.getElementById('pc-name').value;
            const price = document.getElementById('pc-price').value;
            const description = document.getElementById('pc-desc').value;
            const token = localStorage.getItem('accessToken');

            if (!name || !price || !description) {
                alert("BΟΦtΟΦn xanalarΡ± doldurun!");
                return;
            }

            if (!token) {
                alert("Z…ôhm…ôt olmasa giri≈ü edin!");
                location.href = 'login.html';
                return;
            }

            const response = await fetch('http://95.111.230.66:8080/api/computers/add', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    name,
                    price: parseFloat(price),
                    description,
                    imageLinks: uploadedUrls
                }),
                credentials: 'include'
            });

            if (response.ok) {
                alert("UΡüurla …ôlav…ô edildi!");
                location.href = 'index.html';
            } else {
                const data = await response.json();
                alert("X…ôta: " + (data.message || "Τèlav…ô edil…ô bilm…ôdi!"));
            }
        }
    </script>
</body>
</html>
