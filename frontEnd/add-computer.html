<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Kompüter Əlavə Et</title>
    <link rel="stylesheet" href="add-computer.css">
    <style>
        .image-upload-area {
            border: 2px dashed #30363d;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 16px;
            color: #8b949e;
        }
        .image-upload-area:hover { border-color: #58a6ff; color: #58a6ff; }
        .image-preview-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }
        .preview-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #30363d;
        }
        .upload-status {
            color: #58a6ff;
            font-size: 0.85rem;
            margin-bottom: 10px;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Yeni Kompüter Elanı</h2>
        <input type="text" id="pc-name" placeholder="Kompüterin Adı (Məs: Dell XPS)">
        <input type="number" id="pc-price" placeholder="Qiymət (AZN)">
        <textarea id="pc-desc" placeholder="Təsvir"></textarea>

        <!-- IMAGE UPLOAD -->
        <div class="image-upload-area" onclick="document.getElementById('image-input').click()">
            📷 Şəkil əlavə etmək üçün klikləyin
        </div>
<!-- Köhnəni bununla əvəzlə -->
<input type="file" id="image-input" accept="image/*" multiple style="display:none" onchange="handleImageSelect(event)">        <div class="upload-status" id="upload-status"></div>
        <div class="image-preview-container" id="image-previews"></div>

        <button class="btn-blue" onclick="savePC()">Paylaş</button>
        <button class="btn-danger" onclick="history.back()">Geri</button>
    </div>

    <script>
        // Global state: Yüklənmiş şəkillərin linklərini saxlayır
const uploadedUrls = [];

/**
 * Şəkil seçildikdə avtomatik backend-ə yükləyən funksiya
 */
async function handleImageSelect(event) {
    const files = Array.from(event.target.files); // FileList-i Array-ə çeviririk
    const token = localStorage.getItem('accessToken');
    const statusEl = document.getElementById('upload-status');
    const previewsContainer = document.getElementById('image-previews');

    if (!token) {
        alert("Şəkil yükləmək üçün əvvəlcə giriş edin!");
        return;
    }

    for (const file of files) {
        const formData = new FormData();
        formData.append("file", file);

        try {
            statusEl.innerText = `Yüklənir: ${file.name}...`;
            statusEl.style.color = "#58a6ff";

            const response = await fetch('http://95.111.230.66:8080/api/upload/image', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });

            if (!response.ok) throw new Error(`${file.name} yüklənə bilmədi.`);

            const data = await response.json();
            
            // Uğurlu yükləmə
            uploadedUrls.push(data.url);
            renderPreview(data.url, previewsContainer);
            
            statusEl.innerText = `✓ ${file.name} uğurla yükləndi`;
            statusEl.style.color = "#3fb950"; // Yaşıl rəng

        } catch (error) {
            console.error("Yükləmə xətası:", error);
            statusEl.innerText = `✗ Xəta: ${file.name}`;
            statusEl.style.color = "#f85149"; // Qırmızı rəng
        }
    }
}

/**
 * Kiçik önizləmə (thumbnail) yaradan köməkçi funksiya
 */
function renderPreview(url, container) {
    const img = document.createElement('img');
    img.src = url;
    img.className = 'preview-img';
    img.alt = "PC Image";
    container.appendChild(img);
}

/**
 * Bütün məlumatları toplayıb elanı paylaşan funksiya
 */
async function savePC() {
    const token = localStorage.getItem('accessToken');
    
    // Elementləri seçirik
    const fields = {
        name: document.getElementById('pc-name').value.trim(),
        price: document.getElementById('pc-price').value,
        description: document.getElementById('pc-desc').value.trim()
    };

    // Validasiya
    if (!fields.name || !fields.price || !fields.description) {
        return alert("Zəhmət olmasa bütün məlumatları doldurun!");
    }

    if (uploadedUrls.length === 0) {
        return alert("Heç olmasa bir şəkil əlavə edin!");
    }

    if (!token) {
        alert("Sessiya bitib, yenidən giriş edin.");
        window.location.href = 'login.html';
        return;
    }

    try {
        const response = await fetch('http://95.111.230.66:8080/api/computers/add', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                name: fields.name,
                price: parseFloat(fields.price),
                description: fields.description,
                imageLinks: uploadedUrls
            })
        });

        const result = await response.json();

        if (response.ok) {
            alert("Elan uğurla yerləşdirildi!");
            window.location.href = 'index.html';
        } else {
            alert(`Xəta: ${result.message || "Server xətası baş verdi"}`);
        }

    } catch (err) {
        console.error("SavePC xətası:", err);
        alert("Bağlantı xətası! Serverin aktiv olduğundan əmin olun.");
    }
}
    </script>
</body>
</html>
