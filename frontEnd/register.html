<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Qeydiyyat | TechStore</title>
    <link rel="stylesheet" href="register.css"> </head>
<body>
    <div class="auth-container">
        <form class="auth-form" id="register-form">
            <h2>Yeni Hesab</h2>
            <p>Məlumatlarınızı daxil edin</p>
            
            <div class="input-group">
                <input type="text" id="name" placeholder="Ad və Soyad" required>
            </div>
            
            <div class="input-group">
                <input type="email" id="reg-email" placeholder="Email ünvanı" required>
            </div>
            
            <div class="input-group">
                <input type="password" id="reg-password" placeholder="Şifrə" required>
            </div>
            
            <button type="submit" class="btn-auth">Qeydiyyatı Tamamla</button>
            
            <div class="auth-footer">
                Artıq hesabınız var? <a href="login.html">Giriş edin</a>
            </div>
        </form>
    </div>
    <script src="register.js"></script>
</body>
</html>
